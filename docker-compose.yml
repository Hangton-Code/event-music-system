services:
  event-music:
    build: .
    container_name: event-music
    restart: unless-stopped

    # Host networking lets the app detect the server's real LAN IP for the QR
    # code, and lets guests' phones reach it directly. (Linux servers only.)
    network_mode: host

    env_file:
      - .env
    environment:
      PORT: ${PORT:-45416}
